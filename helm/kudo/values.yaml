# Default values for kudo.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

mongodb:
  enabled: true
  auth:
    enabled: false
  useStatefulSet: true

replicaCount: 1

env:
  mongodb:
    # Full MongoDB URI (overrides the auto-generated one when set)
    uri: ""
    db: kudo
  slack:
    # Required: signing secret to verify Slack webhook requests
    signingSecret: ""
    # Required: bot token for sending Slack messages
    botToken: ""
    # Slack OAuth app credentials (for "Sign in with Slack")
    clientId: ""
    clientSecret: ""
  app:
    # Public URL of the app (used for OAuth redirect)
    url: "http://kudo.local"
    # Default Slack workspace ID
    workspaceId: ""
    # Change this in production!
    sessionSecret: "change-me-in-production"
    # Comma-separated Slack user IDs allowed as admins (empty = everyone is admin)
    adminUserIds: ""

image:
  repository: bananaops/kudo
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  http:
    port: 8080
  annotations: {}

ingress:
  enabled: false
  className: traefik
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: kudo.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: kudo-tls
  #    hosts:
  #      - kudo.local

gateway:
  enabled: false
  name: gateway-kudo
  namespace: ""
  pathType: PathPrefix
  annotations: {}
  hosts:
    - host: kudo.local
      paths:
        - path: /

openshift:
  enabled: false
  route:
    enabled: false
    labels: {}
    annotations: {}
    to:
      kind: Service
      weight: 100
    host: kudo.local
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

resources:
  limits:
    cpu: 250m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Configure Prometheus ServiceMonitor scraping
prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    relabelings: []
    scrapeTimeout: 10s

# Configure VictoriaMetrics VMServiceScrape
victoriametrics:
  monitor:
    enabled: false
    additionalLabels: {}
    relabelings: []
    scrapeTimeout: 10s

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
