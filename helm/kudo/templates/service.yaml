apiVersion: v1
kind: Service
metadata:
  name: {{ include "kudo.fullname" . }}
  labels:
    {{- include "kudo.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.http.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kudo.selectorLabels" . | nindent 4 }}
