{{- if .Values.prometheus.monitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "kudo.fullname" . }}
  labels:
    {{- include "kudo.labels" . | nindent 4 }}
    {{- with .Values.prometheus.monitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "kudo.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      {{- if .Values.prometheus.monitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.prometheus.monitor.scrapeTimeout }}
      {{- end }}
      {{- if .Values.prometheus.monitor.relabelings }}
      relabelings:
      {{- toYaml .Values.prometheus.monitor.relabelings | nindent 8 }}
      {{- end }}
{{- end -}}

{{- if .Values.victoriametrics.monitor.enabled -}}
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: {{ include "kudo.fullname" . }}
  labels:
    {{- include "kudo.labels" . | nindent 4 }}
    {{- with .Values.victoriametrics.monitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - path: /metrics
      port: http
      scrapeTimeout: {{ .Values.victoriametrics.monitor.scrapeTimeout }}
      {{- if .Values.victoriametrics.monitor.relabelings }}
      relabelConfigs:
      {{- toYaml .Values.victoriametrics.monitor.relabelings | nindent 8 }}
      {{- end }}
  jobLabel: {{ include "kudo.fullname" . }}
  selector:
    matchLabels:
      {{- include "kudo.selectorLabels" . | nindent 8 }}
{{- end -}}
